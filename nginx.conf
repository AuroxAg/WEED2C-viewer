server {
    listen       ${PORT};
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # gzip text assets; images/fonts are already compressed
    gzip            on;
    gzip_types      text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    # long cache for static dataset assets
    location ~* ^/(assets|thumbs|images)/ {
        expires 7d;
        add_header Cache-Control "public";
    }
    location /data/ {
        expires 1h;
        add_header Cache-Control "public";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
