<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aurox · Dataset Viewers</title>
<meta name="description" content="Intelligent viewers for open plant-detection datasets — WEED2C (weeds in soybean) and SoyCotton-Leafs. Filter, inspect and explore every annotation." />
<link rel="stylesheet" href="styles.css" />
</head>
<body class="page-home">
<!-- ============================ HEADER ============================ -->
<header class="topbar">
  <div class="topbar__inner">
    <a class="brand" href="index.html" aria-label="Aurox">
      <svg class="brand__mark" viewBox="0 0 90 160" aria-hidden="true">
        <path d="M58.77 33.21L85.68 70.99L59.38 112" fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
        <path d="M31.38 33.21L58.30 70.99L32.00 112" fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
        <path d="M4.00 33.21L30.91 70.99L4.62 112"  fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round"/>
      </svg>
      <span class="brand__word">Aurox</span>
      <span class="brand__sep" aria-hidden="true"></span>
      <span class="brand__cat">Autonomous Field Systems</span>
    </a>
    <div class="topbar__right">
      <span class="tool-tag">Dataset Viewers</span>
      <button id="themeBtn" class="theme-toggle" type="button" aria-label="Toggle theme">
        <span data-theme-label>Light</span>
      </button>
    </div>
  </div>
</header>

<!-- ============================ HERO ============================ -->
<section class="hero">
  <div class="hero__inner">
    <p class="hero__eyebrow" id="homeEyebrow"></p>
    <h1 class="hero__title" id="homeTitle"></h1>
    <p class="hero__lede" id="homeLede"></p>
  </div>
</section>

<!-- ============================ DATASETS ============================ -->
<main class="home">
  <div class="home__inner">
    <div class="home__head">
      <h2 class="home__h2">Datasets</h2>
      <span class="home__count" id="dsCount"></span>
    </div>
    <div class="ds-grid" id="dsGrid"></div>
    <p class="home__note" id="homeNote"></p>
  </div>
</main>

<footer class="foot">
  <span>Aurox dataset viewers · study &amp; research · non-commercial</span>
  <span class="foot__brand">Aurox — The farm, autonomous.</span>
</footer>

<script src="theme.js"></script>
<script src="home.js"></script>
</body>
</html>
